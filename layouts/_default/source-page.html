{{ define "main" }}
  {{ partial "page-header" . }}

  <article
    class="gdoc-markdown gdoc-markdown__align--{{ default "left" (.Page.Params.geekdocAlign | lower) }}{{ if eq .Params.sourceFile "system_prompt.md" }} prompt-source{{ end }}"
    id="main-content" tabindex="-1"
  >
    <h1>{{ partial "utils/title" . }}</h1>
    {{ partial "page-metadata" . }}
    {{ with .Params.sourceFile }}
      {{ os.ReadFile . | markdownify }}
    {{ end }}
  </article>
{{ end }}
