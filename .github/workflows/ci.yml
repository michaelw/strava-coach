name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  TASK_SILENT: "0"

jobs:
  pre-commit:
    name: Lint And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44
        with:
          version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up ripgrep
        uses: ./.github/actions/setup-ripgrep

      - name: Set up Hugo
        env:
          # renovate: datasource=github-releases depName=gohugoio/hugo extractVersion=^v(?<version>.*)$
          HUGO_VERSION: "0.157.0"
        run: |
          curl -fsSL -o /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          sudo tar -C /usr/local/bin -xzf /tmp/hugo.tar.gz hugo
          hugo version

      - name: Set up Python
        uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: "3.14"

      - name: Cache pre-commit
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Set up repo tooling
        run: task setup

      - name: Validate PR issue references
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: task ci:issue-refs

      - name: Run repo checks for pull requests
        if: github.event_name == 'pull_request'
        env:
          PRE_COMMIT_SCOPE: changed
          PRE_COMMIT_FROM_REF: ${{ github.event.pull_request.base.sha }}
          PRE_COMMIT_TO_REF: ${{ github.event.pull_request.head.sha }}
        run: task ci:repo

      - name: Run repo checks for pushes
        if: github.event_name != 'pull_request'
        env:
          PRE_COMMIT_SCOPE: all
        run: task ci:repo
