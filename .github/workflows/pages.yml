name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  TASK_SILENT: "0"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set up Hugo
        run: |
          curl -fsSL -o /tmp/hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/hugo.tar.gz hugo
          hugo version

      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44
        with:
          version: "3.x"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Build with Hugo
        run: |
          HUGO_BASE_URL="${{ steps.pages.outputs.base_url }}/" \
          HUGO_DESTINATION=public \
          task site:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@0ca16172ca884f0a37117fed41734f29784cc980
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
