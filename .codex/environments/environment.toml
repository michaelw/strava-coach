version = 1
name = "strava-coach"

[setup]
script = '''
if [ -f "${CODEX_SOURCE_TREE_PATH}/.env" ]; then
  cp "${CODEX_SOURCE_TREE_PATH}/.env" "${CODEX_WORKTREE_PATH}"/.
fi

bash "${CODEX_WORKTREE_PATH}/scripts/devcontainer-post-create.sh"
'''

[[actions]]
name = "Eval Full"
icon = "test"
command = "task eval:full"
