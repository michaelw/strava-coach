description: Strava Coach stochastic smoke canaries
prompts:
  - file://prompts.cjs:candidatePrompt
providers:
  - id: openai:responses:gpt-5-mini
    config:
      max_output_tokens: 1200
      reasoning_effort: minimal
      temperature: 1
      passthrough:
        reasoning:
          effort: minimal
        text:
          format:
            type: text
          verbosity: low
tests:
  - file://../cases/self/smoke/*.yaml
evaluateOptions:
  maxConcurrency: 4
  timeoutMs: 90000
