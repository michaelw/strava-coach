exclude: ^themes/hugo-geekdoc/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args:
          - --disable
          - MD013

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - -d
          - "{extends: default, rules: {line-length: disable}}"

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.33.2
    hooks:
      - id: check-github-workflows

  - repo: local
    hooks:
      - id: validate-changed-case-yaml-files
        name: Validate changed case YAML files
        entry: task eval:validate --
        language: system
        files: ^evals/cases/.+\.yaml$
      - id: validate-full-case-tree-after-validator-changes
        name: Validate full case tree after validator/schema/fixture changes
        entry: task eval:validate
        language: system
        pass_filenames: false
        files: ^(evals/promptfoo/(case\.schema\.json|fixtures\.cjs|validate_cases\.cjs)|evals/fixtures/production/)
